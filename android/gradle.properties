org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# إيقاف الـ Kotlin incremental compilation — يصلح خطأ "different roots"
# الناتج عن وجود المشروع (D:) وكاش الحزم (C:) على قرصين مختلفين على ويندوز
kotlin.incremental=false
